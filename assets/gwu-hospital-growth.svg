<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 840" role="img" aria-labelledby="title desc">
  <title id="title">Hospital SEO growth dashboard</title>
  <desc id="desc">A modern healthcare analytics dashboard showing search rankings, star ratings, patient trust and hospital visibility.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="0.55" stop-color="#dff3f6"/>
      <stop offset="1" stop-color="#eaf4ff"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff8fb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f7fb7"/>
      <stop offset="1" stop-color="#12b3a8"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#95e957"/>
      <stop offset="1" stop-color="#37d58a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#113d4f" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="1120" height="840" rx="56" fill="url(#bg)"/>
  <circle cx="936" cy="132" r="108" fill="#5dd6c2" opacity="0.22" filter="url(#soft)"/>
  <circle cx="185" cy="704" r="122" fill="#69a8ff" opacity="0.18" filter="url(#soft)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="760" height="590" rx="42" fill="url(#screen)"/>
    <rect x="90" y="90" width="760" height="86" rx="42" fill="#ffffff"/>
    <circle cx="145" cy="133" r="13" fill="#ff6b6b"/>
    <circle cx="183" cy="133" r="13" fill="#ffd166"/>
    <circle cx="221" cy="133" r="13" fill="#41d69f"/>
    <rect x="280" y="119" width="250" height="28" rx="14" fill="#e9f1f5"/>
    <rect x="585" y="119" width="90" height="28" rx="14" fill="#d7eff3"/>
    <rect x="696" y="119" width="80" height="28" rx="14" fill="url(#lime)"/>

    <text x="145" y="236" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#163344">Hospital visibility</text>
    <text x="145" y="276" font-family="Inter, Arial, sans-serif" font-size="22" fill="#647887">Local SEO, ratings and patient trust in one growth system.</text>

    <g transform="translate(145 332)">
      <rect width="170" height="144" rx="24" fill="#ffffff"/>
      <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6d8290">Google rank</text>
      <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#12384c">#1-3</text>
      <path d="M25 118 C61 92, 91 124, 132 84, 151 66" fill="none" stroke="#10a6a3" stroke-width="9" stroke-linecap="round"/>
      <circle cx="151" cy="66" r="9" fill="#37d58a"/>
    </g>

    <g transform="translate(337 332)">
      <rect width="170" height="144" rx="24" fill="#ffffff"/>
      <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6d8290">Star rating</text>
      <text x="24" y="92" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#12384c">4.8</text>
      <g fill="#ffc857">
        <path d="M30 112l8 16 18 3-13 12 3 18-16-9-16 9 3-18-13-12 18-3z"/>
        <path d="M70 112l8 16 18 3-13 12 3 18-16-9-16 9 3-18-13-12 18-3z"/>
        <path d="M110 112l8 16 18 3-13 12 3 18-16-9-16 9 3-18-13-12 18-3z"/>
      </g>
    </g>

    <g transform="translate(529 332)">
      <rect width="246" height="144" rx="24" fill="#163344"/>
      <text x="24" y="44" font-family="Inter, Arial, sans-serif" font-size="18" fill="#b8d6df">Patient inquiries</text>
      <text x="24" y="94" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff">+68%</text>
      <rect x="148" y="42" width="70" height="70" rx="18" fill="url(#blue)"/>
      <path d="M169 78h28M183 64v28" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    </g>

    <g transform="translate(145 514)">
      <rect width="630" height="98" rx="26" fill="#ffffff"/>
      <rect x="24" y="26" width="46" height="46" rx="15" fill="#e6f7fa"/>
      <path d="M47 41v32M31 57h32" stroke="#0f7fb7" stroke-width="6" stroke-linecap="round"/>
      <text x="92" y="48" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#183649">Trust-building review response system</text>
      <text x="92" y="78" font-family="Inter, Arial, sans-serif" font-size="18" fill="#6b7f8c">Monitor patient sentiment, improve profiles and protect reputation.</text>
      <rect x="482" y="34" width="114" height="32" rx="16" fill="#e9f7ee"/>
      <text x="505" y="57" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#16875f">Live</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="734" y="250" width="286" height="390" rx="38" fill="#ffffff"/>
    <rect x="770" y="290" width="214" height="144" rx="28" fill="url(#blue)"/>
    <path d="M829 388c-34-10-55-36-55-70 0-34 22-60 55-70 29 5 48 34 48 70s-19 65-48 70z" fill="#e2f8ff" opacity="0.55"/>
    <path d="M900 388c34-10 55-36 55-70 0-34-22-60-55-70-29 5-48 34-48 70s19 65 48 70z" fill="#e2f8ff" opacity="0.55"/>
    <path d="M833 292c22 35 22 74 0 115M899 292c-22 35-22 74 0 115M866 250v182" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
    <text x="770" y="486" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#17384a">Hospital SEO health</text>
    <text x="770" y="520" font-family="Inter, Arial, sans-serif" font-size="17" fill="#6b7f8c">Technical fixes, local pages and review signals aligned for growth.</text>
    <rect x="770" y="558" width="96" height="44" rx="22" fill="#e8f7fa"/>
    <text x="797" y="586" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#0f7fb7">SEO</text>
    <rect x="880" y="558" width="104" height="44" rx="22" fill="#edf8ec"/>
    <text x="904" y="586" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#1c9569">Trust</text>
  </g>
</svg>
